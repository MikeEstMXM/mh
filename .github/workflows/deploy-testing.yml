name: Deploy Testing Branch to GitHub Pages

# Builds main at the root AND a feature branch at /testing/.
# Trigger manually or on push to any branch matching the pattern.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Feature branch to deploy at /testing/"
        required: true
        default: "claude/testing"
  push:
    branches:
      - claude/testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: github-pages
    steps:
      - name: Determine repo base path
        id: paths
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "repo_base=" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "repo_base=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Build main (root) ──────────────────────────────────
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: main-src/package-lock.json

      - name: Build main site
        working-directory: main-src
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.paths.outputs.repo_base }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.paths.outputs.site_url }}
        run: |
          npm ci
          npm run build

      # ── Build testing branch (/testing/) ───────────────────
      - name: Resolve testing branch
        id: testing-branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out testing branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.testing-branch.outputs.ref }}
          path: testing-src

      - name: Build testing site
        working-directory: testing-src
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.paths.outputs.repo_base }}/testing
          NEXT_PUBLIC_SITE_URL: ${{ steps.paths.outputs.site_url }}/testing
        run: |
          npm ci
          npm run build

      # ── Combine artifacts ──────────────────────────────────
      - name: Merge into single output
        run: |
          mkdir -p combined
          cp -r main-src/out/* combined/
          mkdir -p combined/testing
          cp -r testing-src/out/* combined/testing/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
